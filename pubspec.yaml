name: adsparkle_flutter
description: Flutter client SDK for the AdSparkle affiliate attribution tracking platform. Deterministic Android install attribution via the Play Install Referrer; pure Dart on every other platform.
version: 0.1.5
repository: https://github.com/Adsparkle/adsparkle-flutter

environment:
  sdk: '>=2.18.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.0.0
  shared_preferences: ^2.0.0

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: co.adsparkle.adsparkle_flutter
        pluginClass: AdsparkleFlutterPlugin
